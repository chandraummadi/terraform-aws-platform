name: Docs

# This is the ONLY workflow that touches terraform-docs. It replaces what
# were previously three separate, drifting implementations (a regen step
# inside ci.yml's validate job, a docs-check job in ci.yml, and a whole
# separate terraform-docs.yml). One job, one behavior, per event type.

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**/*.tf"
      - "*.tf"
  push:
    branches: [main]
    paths:
      - "modules/**/*.tf"
      - "*.tf"

permissions:
  contents: write
  pull-requests: write

env:
  TERRAFORM_DOCS_VERSION: "0.18.0"

jobs:
  # On PRs: fail the check if generated docs would differ from what's
  # committed. This is what actually blocks merges — nothing here writes.
  check:
    name: Check docs are up to date
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-docs/gh-actions@v1
        with:
          version: ${{ env.TERRAFORM_DOCS_VERSION }}

      - name: Regenerate and diff
        run: |
          set -e
          FAILED=0
          for dir in $(find modules -mindepth 1 -maxdepth 1 -type d) .; do
            if [ -f "$dir/README.md" ] && compgen -G "$dir/*.tf" > /dev/null; then
              terraform-docs markdown table --output-file README.md --output-mode inject "$dir"
              if ! git diff --exit-code -- "$dir/README.md"; then
                echo "::error::$dir/README.md is out of date. Run: terraform-docs markdown table --output-file README.md --output-mode inject $dir"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  # On merge to main: regenerate and open a PR (never push directly to
  # main — main is protected and requires a review, per
  # docs/release-process.md; a bot force-push would either be rejected or
  # would silently bypass that review requirement, so we don't do it).
  update:
    name: Open docs-update PR if needed
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: terraform-docs/gh-actions@v1
        with:
          version: ${{ env.TERRAFORM_DOCS_VERSION }}

      - name: Regenerate docs
        run: |
          for dir in $(find modules -mindepth 1 -maxdepth 1 -type d) .; do
            if [ -f "$dir/README.md" ] && compgen -G "$dir/*.tf" > /dev/null; then
              terraform-docs markdown table --output-file README.md --output-mode inject "$dir"
            fi
          done

      - name: Open PR with any resulting changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update terraform-docs output"
          title: "docs: update terraform-docs output"
          body: Auto-generated by the Docs workflow after a merge to `main`. Requires normal review before merging, same as any other change.
          branch: automation/terraform-docs-update
          delete-branch: true
